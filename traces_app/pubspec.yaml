name: traces_app
description: Preserve the memory of places.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.0

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^12.1.3

  # Network
  dio: ^5.4.0

  # UI
  cached_network_image: ^3.3.1
  flutter_map: ^6.1.0           # interactive maps
  latlong2: ^0.9.0
  image_picker: ^1.0.7
  photo_view: ^0.14.0

  # Utilities
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  intl: ^0.19.0
  uuid: ^4.3.3
  flutter_dotenv: ^5.1.0
  share_plus: ^7.2.1
  url_launcher: ^6.2.4
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5        # QR check-in

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  custom_lint: ^0.5.7
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
  fonts:
    - family: TracesDisplay
      fonts:
        - asset: assets/fonts/TracesDisplay-Regular.ttf
